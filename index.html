<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="护理答题">
<meta name="mobile-web-app-capable" content="yes">
<title>护理答题练习</title>
<style>
:root{
  --bg:#f5f7fa;
  --card:#fff;
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --danger:#dc2626;
  --success:#16a34a;
  --warning:#f59e0b;
  --text:#1e293b;
  --text2:#64748b;
  --border:#e2e8f0;
  --radius:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --safe-bottom:env(safe-area-inset-bottom,16px);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;
  user-select:none;
  padding-bottom:var(--safe-bottom);
}
.header{
  background:linear-gradient(135deg,#1e40af,#3b82f6);
  color:#fff;
  padding:16px 20px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
.header .sub{font-size:12px;opacity:.85;margin-top:2px}
.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:12px 24px;border:none;border-radius:var(--radius);
  font-size:16px;font-weight:600;cursor:pointer;
  transition:all .2s;text-decoration:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  min-height:48px;
}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:8px 16px;font-size:14px;min-height:36px}
.btn-block{display:flex;width:100%}
.stat-row{display:flex;gap:12px;flex-wrap:wrap}
.stat-item{
  flex:1;min-width:80px;text-align:center;
  background:var(--card);border-radius:var(--radius);
  padding:16px 12px;box-shadow:var(--shadow);
}
.stat-item .num{font-size:28px;font-weight:700;color:var(--primary)}
.stat-item .label{font-size:12px;color:var(--text2);margin-top:4px}
.timer{
  font-size:28px;font-weight:700;text-align:center;
  padding:10px;color:var(--text);
}
.timer.warning{color:var(--danger);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar{
  height:6px;background:var(--border);border-radius:3px;
  margin:8px 0;overflow:hidden;
}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.progress-text{font-size:13px;color:var(--text2);text-align:center}
.q-card{
  background:var(--card);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;box-shadow:var(--shadow);
  border-left:4px solid var(--primary);
}
.q-card.multi{border-left-color:#8b5cf6}
.q-num{font-size:12px;color:var(--primary);font-weight:600;margin-bottom:6px}
.q-text{font-size:13.5px;line-height:1.4;margin-bottom:8px;color:var(--text)}
.option{
  display:flex;align-items:center;padding:9px 10px;
  margin-bottom:3px;border:2px solid var(--border);
  border-radius:8px;cursor:pointer;transition:all .15s;
  font-size:13.5px;line-height:1.3;min-height:38px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.option:active{background:#f1f5f9}
.option.selected{border-color:var(--primary);background:#eff6ff}
.option.correct{border-color:var(--success);background:#f0fdf4}
.option.wrong{border-color:var(--danger);background:#fef2f2}
.option .letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  background:var(--border);color:var(--text2);
  font-weight:700;font-size:12px;margin-right:8px;
  flex-shrink:0;transition:all .15s;
}
.option.selected .letter{background:var(--primary);color:#fff}
.option.correct .letter{background:var(--success);color:#fff}
.option.wrong .letter{background:var(--danger);color:#fff}
.nav-btns{display:flex;gap:10px;margin-top:16px}
.nav-btns .btn{flex:1}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:36px;font-weight:700;
  border:6px solid;
}
.score-excellent{border-color:var(--success);color:var(--success)}
.score-good{border-color:var(--primary);color:var(--primary)}
.score-fair{border-color:var(--warning);color:var(--warning)}
.score-poor{border-color:var(--danger);color:var(--danger)}
.result-stats{display:flex;gap:10px;text-align:center;margin:16px 0}
.result-stat{flex:1;padding:12px;background:#f8fafc;border-radius:10px}
.result-stat .val{font-size:22px;font-weight:700}
.result-stat .lbl{font-size:12px;color:var(--text2)}
.wrong-list{margin-top:10px}
.wrong-item{
  padding:12px;background:#fef2f2;border-radius:10px;
  margin-bottom:8px;font-size:14px;line-height:1.5;
}
.wrong-item .q-title{font-weight:600;margin-bottom:4px}
.wrong-item .your-ans{color:var(--danger)}
.wrong-item .right-ans{color:var(--success)}
.tag{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.tag-single{background:#dbeafe;color:#1e40af}
.tag-multi{background:#ede9fe;color:#6d28d9}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.tab-bar{display:flex;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.tab{flex:1;text-align:center;padding:12px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);padding:12px 16px calc(12px + env(safe-area-inset-bottom,0));
  box-shadow:0 -2px 8px rgba(0,0,0,.08);
  z-index:100;display:flex;gap:10px;
}
.bottom-bar .btn{flex:1}
/* 题目导航 */
.q-nav{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;max-height:0;overflow:hidden;transition:max-height .3s}
.q-nav.open{max-height:300px}
.q-nav-toggle{text-align:center;font-size:12px;color:var(--primary);padding:4px;cursor:pointer;margin-bottom:4px}
.q-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;cursor:pointer;
  background:#f1f5f9;color:var(--text2);
  border:2px solid transparent;transition:all .15s;
}
.q-dot.answered{background:#dbeafe;color:#1e40af}
.q-dot.current{border-color:var(--primary);background:#eff6ff;color:var(--primary)}
.q-dot.marked{position:relative}
.q-dot.marked::after{content:'';position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:var(--warning);border-radius:50%}
.review-card{
  background:var(--card);border-radius:var(--radius);
  padding:16px;margin-bottom:10px;box-shadow:var(--shadow);
}
.review-card .q-text{font-size:14px}
.review-card .meta{font-size:12px;color:var(--text2);margin-bottom:8px}
.confirm-dialog{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.confirm-dialog .inner{
  background:#fff;border-radius:16px;padding:24px;
  max-width:320px;width:100%;text-align:center;
}
.confirm-dialog h3{margin-bottom:12px}
.confirm-dialog p{font-size:14px;color:var(--text2);margin-bottom:20px}
.confirm-dialog .btns{display:flex;gap:10px}
.confirm-dialog .btns .btn{flex:1}
.search-box{
  width:100%;padding:10px 14px;border:2px solid var(--border);
  border-radius:var(--radius);font-size:14px;margin-bottom:12px;
  outline:none;transition:border-color .2s;
}
.search-box:focus{border-color:var(--primary)}
.bank-tag{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:600;margin-left:6px;vertical-align:middle;
}
.bank-tag-b1{background:#fef3c7;color:#92400e}
.bank-tag-b2{background:#dbeafe;color:#1e40af}
.all-q-item{
  background:var(--card);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow);
  font-size:13.5px;line-height:1.5;cursor:pointer;transition:background .15s;
}
.all-q-item:active{background:#f8fafc}
.all-q-item .q-header{display:flex;align-items:flex-start;gap:8px}
.all-q-item .q-idx{font-size:12px;color:var(--text2);flex-shrink:0;min-width:28px}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:8px}
.chart-bar{flex:1;background:var(--primary);border-radius:3px 3px 0 0;min-width:6px;transition:height .3s}
.chart-bar-label{font-size:10px;color:var(--text2);text-align:center;margin-top:2px}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.perf-box{padding:12px;background:#f8fafc;border-radius:10px;text-align:center}
.perf-box .val{font-size:20px;font-weight:700}
.perf-box .lbl{font-size:11px;color:var(--text2);margin-top:2px}
</style>
<link rel="manifest" href="/quiz_app.webmanifest">
</head>
<body>
<div class="header"><h1>护理答题练习</h1><div class="sub" id="headerSub">2026年山西省护理岗位技能大赛</div></div>

<!-- 首页 -->
<div class="page active" id="page-home">
  <div class="stat-row" style="margin-bottom:16px">
    <div class="stat-item"><div class="num" id="stat-total">0</div><div class="label">已做题数</div></div>
    <div class="stat-item"><div class="num" id="stat-correct">0</div><div class="label">正确率</div></div>

<!-- 答题页 -->
<div class="page" id="page-exam">
  <div style="font-size:12px;text-align:center;color:var(--text2);margin-bottom:4px" id="modeLabel"></div><div class="timer" id="timer">45:00</div>

<!-- 错题本 -->
<div class="page" id="page-wrong">

</div>


<!-- 查看所有题 -->

    <div class="btns">
      <button class="btn btn-outline" onclick="closeConfirm()">继续答题</button>
      <button class="btn btn-danger" onclick="submitExam()">确认交卷</button>

</div>

<script>
// ========== 题库数据 ==========
var QUESTIONS = {"bank1":[{"id":1,"type":"single","question":"根据《手术部（室）医院感染控制标准》，为防护血液、体液渗透和喷溅，手术部（室）应为医务人员配备的个人防护设备不包括以下哪项？","options":["A、防渗透手术服","B、护目镜","C、防渗透手套","D、全遮盖式手术帽"],"answer":"C"},{"id":2,"type":"single","question":"某医院负压手术间完成一台特殊感染手术后，清洁消毒工作已结束。若要安排另一台同种病原体感染的手术，净化系统至少还需连续运行多长时间？","options":["A、立即可以进行","B、运行到清洁消毒工作完成后15分钟以上","C、运行到清洁消毒工作完成后30分钟以上","D、运行到清洁消毒工作完成后60分钟以上"],"answer":"C"},{"id":3,"type":"single","question":"根据《手术部（室）医院感染控制标准》，以下哪项是对“手术部（室）”最准确的定义？","options":["A、对患者实施手术操作的房间","B、由手术间及其辅助用房组成，用于集中为患者实施手术操作的独立功能区域","C、为维持手术区域较高的环境卫生洁净程度，对人员流向、物流进行严格限制的区域","D、采用空气洁净技术，将手术环境空气中的微生物粒子及微粒总量降至允许水平的手术间"],"answer":"B"},{"id":4,"type":"single","question":"某医院计划新建一个洁净手术部，在规划其感染控制制度时，关于空气洁净系统的综合性能评价，以下哪项安排符合规范要求？","options":["A、每季度进行一次综合性能评价","B、至少每3年进行一次综合性能评价","C、至少每1年～2年进行一次综合性能评价","D、仅在系统故障或怀疑感染时进行评价"],"answer":"C"},{"id":5,"type":"single","question":"医院感染控制科在审核手术部（室）的布局规划方案时，发现方案中未设置隔离手术间。根据相关标准，以下哪项是必须遵守的规定？","options":["A、所有手术间都应具备正负压转换功能","B、手术部（室）必须设有隔离手术间","C、只有洁净手术部才需要设置隔离手术间","D、隔离手术间仅用于普通手术后的连台手术"],"answer":"B"},{"id":6,"type":"single","question":"根据《新生儿病区医院感染预防与控制标准》，关于新生儿病区布局的要求，以下哪项描述是正确的？","options":["A、病区应设置在靠近医院污染区域的位置，以便于污物处理。","B、病区内的每个房间应设置1套及以上非手触式洗手设施。","C、诊疗区可以不设置独立的隔离室/区，统一安置即可。","D、新生儿床单元只需满足医疗救治要求，无需考虑感染控制。"],"answer":"B"},{"id":7,"type":"single","question":"根据《新生儿病区医院感染预防与控制标准》，新生儿暖箱的日常清洁消毒应遵循什么原则？","options":["A、由污到洁","B、由洁到污","C、先内后外","D、先消毒后清洁"],"answer":"B"},{"id":8,"type":"single","question":"在新生儿病区进行暖箱的日常清洁消毒时，关于清洁顺序，以下哪项操作符合标准要求？","options":["A、先清洁感染患儿使用后的暖箱，后清洁普通患儿使用后的暖箱","B、先清洁普通患儿使用后的暖箱，后清洁感染患儿使用后的暖箱","C、感染患儿与普通患儿使用后的暖箱可同时清洁","D、只清洁感染患儿使用后的暖箱，普通患儿的暖箱无需清洁"],"answer":"B"},{"id":9,"type":"single","question":"某医院新生儿病区拟制定多重耐药菌感染防控措施，应主要参考以下哪份文件的要求？","options":["A、WS/T311","B、WS/T313","C、WS/T509","D、WS/T510"],"answer":"C"},{"id":10,"type":"single","question":"为加强新生儿病区医院感染预防与控制，以下哪项措施是核心要求？","options":["A、每个房间设置非手触式洗手设施","B、严格执行手卫生，每个床单元配备速干手消毒剂","C、每日对新生儿暖箱内表面进行消毒","D、对探视人员进行健康评估"],"answer":"B"},{"id":11,"type":"single","question":"根据《医疗机构环境表面清洁与消毒管理标准》，在低度风险区域进行日常环境清洁时，关于个人防护用品的选择，以下哪项是必须使用的？","options":["A、口罩","B、手套","C、工作服","D、帽子"],"answer":"C"},{"id":12,"type":"single","question":"某医院感染管理科护士在准备对病房高频接触表面进行日常消毒，她手头有70%的乙醇消毒液。根据相关标准，她应确保消毒作用时间至少达到多少分钟？","options":["A、3分钟","B、15分钟","C、30分钟","D、60分钟"],"answer":"A"},{"id":13,"type":"single","question":"医疗机构在开展环境表面清洁与消毒管理工作时，需要遵循一系列国家和行业标准。以下哪项标准是《医疗机构环境表面清洁与消毒管理标准》中明确列出的、用于规范医疗机构消毒技术的标准？","options":["A、GB15979","B、GB19193","C、WS/T311","D、WS/T367"],"answer":"D"},{"id":14,"type":"single","question":"根据医疗机构环境表面清洁卫生管理要求，某医院普通住院病房（中度风险区域）进行清洁卫生管理后，其微生物检测结果应满足什么要求？","options":["A、细菌菌落总数≤5CFU/cm²","B、细菌菌落总数≤10CFU/cm²，或自然菌减少1个对数值以上","C、细菌菌落总数≤15CFU/cm²","D、按照GB15982执行，自然菌减少1个对数值以上"],"answer":"B"},{"id":15,"type":"single","question":"一名保洁员在手术室（高度风险区域）进行常规环境表面清洁时，根据个人防护用品选择要求，他/她必须佩戴哪种口罩？","options":["A、医用防护口罩（++）","B、外科口罩（+）","C、可使用或按该区域的个人防护要求使用（±）","D、可以不使用（-）"],"answer":"A"},{"id":16,"type":"single","question":"根据《医疗机构重点部门感染预防与控制通用标准》，某医院重症监护病房（ICU）的感控护士在制定季度监测计划时，以下哪项监测的频率要求是至少每半年一次？","options":["A、使用中消毒剂染菌量监测","B、手卫生监测","C、环境表面清洁消毒效果监测","D、紫外线灯辐射照度监测"],"answer":"D"},{"id":17,"type":"single","question":"根据《医疗机构重点部门感染预防与控制通用标准》，对于多重耐药菌感染防控措施，以下哪项描述是准确的？","options":["A、主要依靠患者自身免疫力，无需额外措施","B、只需执行手卫生和环境清洁即可","C、应遵循WS/T826、《多重耐药菌医院感染防控技术指南》等要求，执行包括手卫生、接触隔离、环境清洁消毒、抗菌药物合理使用等措施","D、仅需在重症监护病房等高风险部门执行"],"answer":"C"},{"id":18,"type":"single","question":"根据《医疗机构重点部门感染预防与控制通用标准》附录A的表格，关于“口腔科门诊”的医院感染监测项目，以下哪项是正确的？","options":["A、必须开展目标性监测","B、必须开展医疗器械、器具和物品消毒效果监测","C、必须开展散发病例、聚集性病例、暴发事件的监测","D、必须开展空气净化或消毒效果监测"],"answer":"B"},{"id":19,"type":"single","question":"某医院计划在新生儿重症监护病房成立医院感染管理小组。根据相关规定，以下关于该小组成员的描述，哪一项是正确的？","options":["A、小组由医院感染管理部门指定人员组成，人数不少于2人。","B、小组成员必须包括科主任、护士长、感控医生和感控护士，且总人数不少于3人。","C、小组由部门负责人担任组长，成员至少3人，临床部门应包括科主任、护士长、感控医生和感控护士。","D、小组由科主任和护士长共同担任组长，成员包括感控医生和感控护士，共4人。"],"answer":"C"},{"id":20,"type":"single","question":"根据《医疗机构重点部门感染预防与控制通用标准》，以下哪个重点部门需要对其关键设备“内镜”的清洗消毒效果进行定期监测？","options":["A、新生儿病房","B、血液透析中心（部门）","C、内镜中心（室）","D、口腔科门诊"],"answer":"C"},{"id":21,"type":"single","question":"护士小王在为患者进行输液前，准备对输液接头进行消毒。若该消毒剂的产品说明书未注明擦拭时间，她至少应擦拭多长时间？","options":["A、至少擦拭5秒","B、至少擦拭10秒","C、至少擦拭15秒","D、至少擦拭30秒"],"answer":"C"},{"id":22,"type":"single","question":"在临床操作中，以下关于一次性注射器使用的做法，哪一项是符合规范要求的？","options":["A、同一支预充式注射器在不同患者间共用","B、一次性注射器在有效期内可以重复使用","C、一次性注射器、针头应一人一用一抛弃","D、高压注射器连接管可以消毒后重复使用"],"answer":"C"},{"id":23,"type":"single","question":"护士小李在为患者注射后，处理使用过的针头。根据《安全注射标准》，下列哪项操作是绝对禁止的？","options":["A、使用辅助用具拆卸使用过的针头","B、将使用过的针头立即放入利器盒","C、双手回套使用过的针帽","D、当利器盒容量达到3/4时封闭并更换"],"answer":"C"},{"id":24,"type":"single","question":"某医院计划加强安全注射管理。根据《安全注射标准》，下列哪项是医疗机构在管理层面应落实的核心措施？","options":["A、为所有患者提供单剂量药液","B、定期对注射操作人员进行手卫生培训","C、明确各部门职责并制定安全注射相关规章制度","D、在治疗准备室集中配制所有注射药品"],"answer":"C"},{"id":25,"type":"single","question":"护士小王在为患者进行静脉注射前，从无菌包装中取出注射器和针头后，因临时处理其他事务未能立即使用。根据安全注射标准，她应如何正确存放这些物品？","options":["A、放入治疗车抽屉内，有效期4小时","B、放入刚打开未污染的原无菌包装内，有效期4小时","C、放入无菌盘内，有效期2小时","D、留在治疗台上，尽快使用即可"],"answer":"B"},{"id":26,"type":"single","question":"根据安全注射标准，以下哪项操作不属于本标准直接适用的范围？","options":["A、某医院护士为患者进行肌内注射","B、某社区卫生服务中心医生为患者进行静脉输液","C、某诊所医生使用注射器为患者进行关节腔穿刺","D、某医院医生使用手术刀进行外科切开"],"answer":"D"},{"id":27,"type":"single","question":"护士小王在为患者更换输液装置时，需要连接一个新的延长管。根据标准，这个延长管属于哪一类装置？","options":["A、给药装置","B、血管导管","C、输液附加装置","D、个人防护用品"],"answer":"C"},{"id":28,"type":"single","question":"护士小王上午9点从无菌包装中取出注射器，但因故未能立即使用。她应如何放置该注射器，且其有效期为多久？","options":["A、放入刚打开未污染的原无菌包装内，有效期2小时","B、放入预先铺置的无菌盘内，有效期4小时","C、放入普通治疗盘内，有效期2小时","D、放回原包装袋内，有效期24小时"],"answer":"B"},{"id":29,"type":"single","question":"根据安全注射标准，护士在为患者进行以下哪项操作时，必须佩戴医用外科口罩？","options":["A、更换血管导管穿刺部位敷料","B、配制肠外营养液","C、实施皮内注射","D、进行手卫生操作"],"answer":"C"},{"id":30,"type":"single","question":"根据安全注射标准，以下哪种做法符合注射器具的使用要求？","options":["A、将已抽吸药液的注射器放回原无菌包装内，并在24小时内使用","B、从预充式注射器中抽取药液，以减少浪费","C、每次注射时，使用新的、包装完好的无菌注射器和针头","D、注射器和针头从无菌包装取出后若不能立即使用，有效期可延长至8小时"],"answer":"C"},{"id":31,"type":"single","question":"根据Barthel指数评定量表，一名患者能够自己独立完成洗澡过程，但需要他人帮助才能控制小便，那么该患者在'控制小便'项目上应得多少分？","options":["A、15分","B、10分","C、5分","D、0分"],"answer":"C"},{"id":32,"type":"single","question":"根据Barthel指数评定量表，一名患者在“床椅转移”项目上“需极大帮助”，该项目应得多少分？","options":["A、15分","B、10分","C、5分","D、0分"],"answer":"C"},{"id":33,"type":"single","question":"一位住院患者的Barthel指数评定量表总分为55分。根据自理能力分级标准，该患者需要何种程度的照护？","options":["A、全部需要他人照护","B、大部分需他人照护","C、少部分需他人照护","D、无需他人照护"],"answer":"B"},{"id":34,"type":"single","question":"根据自理能力分级标准，一位患者的Barthel指数评定量表总分为65分，其自理能力等级应评定为？","options":["A、重度依赖","B、中度依赖","C、轻度依赖","D、无依赖"],"answer":"C"},{"id":35,"type":"single","question":"护士使用Barthel指数评定量表对患者进行评估。评估项目“平地行走”一项，若患者可独立在平地上行走45米，此项应得多少分？","options":["A、5分","B、10分","C、15分","D、0分"],"answer":"C"},{"id":36,"type":"single","question":"根据Barthel指数评定量表，若某位患者能够独立完成平地行走45米，但上下楼梯时需要部分帮助，他在“平地行走”和“上下楼梯”这两个项目上分别能得多少分？","options":["A、平地行走得15分，上下楼梯得5分","B、平地行走得15分，上下楼梯得10分","C、平地行走得10分，上下楼梯得5分","D、平地行走得10分，上下楼梯得10分"],"answer":"A"},{"id":37,"type":"single","question":"一位患者的Barthel指数评定量表总分为58分。根据自理能力分级标准，该患者应被评定为哪个等级？","options":["A、重度依赖","B、中度依赖","C、轻度依赖","D、无依赖"],"answer":"B"},{"id":38,"type":"single","question":"根据《护理分级标准》，使用Barthel指数评定量表对患者进行自理能力分级时，下列哪项日常活动项目评分为5分时，代表患者“可独立完成”？","options":["A、洗澡","B、修饰","C、床椅转移","D、控制大便"],"answer":"B"},{"id":39,"type":"single","question":"根据护理分级标准，确定患者护理分级的主要依据是什么？","options":["A、仅根据患者的病情严重程度","B、仅根据患者的自理能力等级","C、根据患者的病情等级和/或自理能力等级","D、根据患者的年龄和性别"],"answer":"C"},{"id":40,"type":"single","question":"一位患者在Barthel指数评定量表中，洗澡项目得分为5分，这表示该患者在这项活动中处于什么状态？","options":["A、完全独立","B、需部分帮助","C、需极大帮助","D、完全依赖"],"answer":"A"},{"id":41,"type":"single","question":"根据《患者身份识别管理标准》，在进行患者身份识别时，以下哪项做法是严格禁止的？","options":["A、同时使用姓名和身份证号进行核对","B、将房间号或床位号作为识别信息","C、使用开放式提问患者姓名","D、核对腕带信息与病历记录"],"answer":"B"},{"id":42,"type":"single","question":"护士小王在为患者进行输液前，需要执行身份识别。根据标准，她至少应同时使用几种识别方法？","options":["A、一种","B、两种","C、三种","D、四种"],"answer":"B"},{"id":43,"type":"single","question":"手术室护士小张在核对一位即将手术的患者身份时，发现患者腕带信息与病历信息存在一处不一致。根据患者身份识别管理标准，小张此时最应该怎么做？","options":["A、请患者本人再次口头确认信息后，继续手术准备。","B、优先进行麻醉诱导，在手术开始前再核对身份。","C、停止当前操作，由至少两名医务人员重新核对确认无误后再处置。","D、只要患者姓名和手术部位正确，即可继续进行手术操作。"],"answer":"C"},{"id":44,"type":"single","question":"在为一名急诊入院、意识清醒的患者进行输血前身份核实时，护士小王应至少同时使用哪两种身份识别信息进行核对？","options":["A、患者姓名和病房号","B、患者姓名和身份证号","C、患者性别和出生日期","D、患者住院号和床位号"],"answer":"B"},{"id":45,"type":"single","question":"根据《患者身份识别管理标准》，主管部门应如何对医务人员执行患者身份识别流程的情况进行监督？","options":["A、仅通过定期审查条形码扫描比例来监督","B、仅通过收集患者身份识别错误事件报告来监督","C、通过定期与不定期的明察暗访，在查房、转运交接等环节实地观察并记录","D、仅通过检查腕带信息的准确性和可靠性来监督"],"answer":"C"},{"id":46,"type":"single","question":"护士小王在为患者进行静脉输液前进行身份核对。根据患者身份识别管理标准，下列哪项信息是绝对不能单独用于识别患者身份的？","options":["A、患者姓名和住院号","B、患者姓名和身份证号","C、患者姓名和床位号","D、患者姓名和出生日期"],"answer":"C"},{"id":47,"type":"single","question":"手术室护士小李准备为一位已麻醉的患者进行手术。根据患者身份识别管理标准，在手术操作开始前，小李必须确保完成哪项关键步骤？","options":["A、核对手术器械清单","B、正确识别患者身份","C、检查麻醉设备运行状态","D、确认手术同意书已签署"],"answer":"B"},{"id":48,"type":"single","question":"根据患者身份识别管理标准，在进行身份识别时，以下哪项是必须遵守的基本原则？","options":["A、至少同时使用两种患者身份识别信息，其中宜包含身份证号或病案号等唯一识别信息。","B、必须将房间号或床位号作为辅助识别信息。","C、在所有环节都必须使用腕带作为唯一识别工具。","D、只需核对患者姓名即可确认身份。"],"answer":"A"},{"id":49,"type":"single","question":"护士在为患者进行输血操作前，需要核对患者身份。根据标准，以下哪种做法是正确的？","options":["A、核对患者的姓名和房间号。","B、核对患者的姓名和身份证号。","C、核对患者的姓名和床号。","D、仅核对患者腕带上的姓名。"],"answer":"B"},{"id":50,"type":"single","question":"根据患者身份识别管理要求，在患者转运交接的关键环节，应如何确认患者身份？","options":["A、由交接双方医务人员共同核对腕带信息","B、与患者或家属共同核实，至少使用两种方法进行身份识别确认","C、使用PDA扫描标签或条形码进行核对","D、通过开放式询问患者来核对身份信息"],"answer":"B"},{"id":51,"type":"single","question":"根据《导尿管相关尿路感染预防与控制标准》，为预防导尿管相关尿路感染，对留置导尿管的患者，应使用何种引流装置？","options":["A、开放式引流装置","B、重力引流装置","C、密闭式引流装置","D、间歇引流装置"],"answer":"C"},{"id":52,"type":"single","question":"根据《导尿管相关尿路感染预防与控制标准》，医务人员在实施导尿管留置或维护操作时，必须遵守哪项规范以进行手卫生？","options":["A、WS/T312 医院感染监测标准","B、WS/T313 医务人员手卫生规范","C、WS/T489 尿液标本临床微生物实验室检验操作指南","D、WS/T524 医院感染暴发控制标准"],"answer":"B"},{"id":53,"type":"single","question":"根据《导尿管相关尿路感染预防与控制标准》，关于留置导尿管的适应征，以下哪项描述是正确的？","options":["A、对于所有手术患者，都应常规留置导尿管以监测尿量。","B、对于尿失禁的患者，应常规使用导尿管以保持清洁。","C、对于非盆腔手术的患者，不宜常规使用导尿管。","D、手术患者留置导尿管后，若无特殊情况，应在术后72小时拔除。"],"answer":"C"},{"id":54,"type":"single","question":"一名患者因手术留置了导尿管，根据标准，关于拔除导尿管的时机，以下做法最符合要求的是？","options":["A、术后48小时内，若患者生命体征平稳，即可拔除。","B、术后24小时内，除病情需要外，宜尽早拔除。","C、术后72小时内，根据患者主诉疼痛情况决定是否拔除。","D、术后直至患者可以下床活动时，再考虑拔除。"],"answer":"B"},{"id":55,"type":"single","question":"护士小李在护理一位留置导尿管的患者时，下列哪项操作符合预防导尿管相关尿路感染的要求？","options":["A、将集尿袋悬挂在床边，使其位置与膀胱齐平","B、为防止导尿管打折，将其盘绕在患者大腿上","C、保持集尿袋位置低于膀胱水平，且不接触地面","D、为防止尿液逆流，每天使用含消毒剂的溶液冲洗膀胱"],"answer":"C"},{"id":56,"type":"single","question":"为预防导尿管相关尿路感染，医疗机构应避免采取以下哪种常规做法？","options":["A、在集尿袋中加入抗菌药物","B、每日评估留置导尿管的必要性","C、保持导尿系统密闭、通畅和完整","D、根据产品说明书更换导尿管和集尿袋"],"answer":"A"},{"id":57,"type":"single","question":"一位男性患者，无认知功能障碍且残余尿量较少，为降低导尿管相关尿路感染风险，可考虑采用哪种替代留置导尿管的方法？","options":["A、间歇导尿","B、避孕套导尿","C、耻骨上膀胱造瘘","D、常规留置导尿"],"answer":"B"},{"id":58,"type":"single","question":"护士在为患者进行留置导尿操作时，以下哪项操作符合标准要求以降低尿道损伤风险？","options":["A、置管前在导尿管上涂抹无菌润滑剂","B、置管后常规使用抗菌药物涂层的导尿管","C、为预防感染，置管前常规进行膀胱冲洗","D、置管后常规在集尿袋中加入消毒剂"],"answer":"A"},{"id":59,"type":"single","question":"根据《导尿管相关尿路感染预防与控制标准》，关于留置导尿管患者的日常管理，以下哪项措施是必须执行的？","options":["A、常规使用含消毒剂的溶液进行膀胱冲洗","B、每天评估留置导尿管的必要性","C、常规在集尿袋中加入抗菌药物","D、常规更换导尿管以预防感染"],"answer":"B"},{"id":60,"type":"single","question":"一名患者拔除导尿管后36小时出现尿路感染症状。根据相关标准，该感染是否属于导尿管相关尿路感染（CAUTI）？","options":["A、属于，因为发生在拔管后","B、不属于，因为拔管时间已超过48小时","C、属于，因为发生在拔管后48小时内","D、不属于，因为拔管时间未超过24小时"],"answer":"A"},{"id":61,"type":"single","question":"护士小李负责护理一位接受机械通气的患者，该患者无体位禁忌。根据预防措施要求，小李应将患者的床头调整至什么角度？","options":["A、0°~15°","B、15°~30°","C、30°~45°","D、45°~60°"],"answer":"C"},{"id":62,"type":"single","question":"一位患者因重症肺炎行气管插管并接受有创机械通气治疗，5天后出现发热、咳嗽、咳脓痰。根据相关标准，该患者的情况最可能被诊断为？","options":["A、社区获得性肺炎","B、呼吸机相关肺炎 (VAP)","C、医院获得性肺炎","D、气管插管相关性肺炎"],"answer":"B"},{"id":63,"type":"single","question":"某医院重症监护室正在制定呼吸机相关肺炎（VAP）的预防与控制工作规范。根据相关标准，这项工作应被纳入以下哪个管理体系？","options":["A、医院感染管理","B、医疗质量和医疗安全管理","C、护理质量管理","D、设备维护管理"],"answer":"B"},{"id":64,"type":"single","question":"根据相关标准，关于本标准的主要适用范围，以下哪项描述是正确的？","options":["A、仅适用于三级甲等医院的重症监护病房","B、适用于所有开展呼吸机相关诊疗活动的医疗机构","C、仅适用于成人患者的呼吸机相关诊疗活动","D、仅适用于有创机械通气的患者"],"answer":"B"},{"id":65,"type":"single","question":"为预防呼吸机相关肺炎，护士在每日查房时应重点关注哪项评估内容？","options":["A、评估患者是否需要使用镇静剂","B、评估呼吸机及气管插管的必要性","C、评估患者是否需要肠内营养","D、评估患者床头抬高的角度"],"answer":"B"},{"id":66,"type":"single","question":"护士在护理使用呼吸机的患者时，关于呼吸机管路集水杯的处理，以下哪项操作是正确的？","options":["A、集水杯应处于管路最高位置，以利于冷凝水收集","B、清除冷凝水时应断开呼吸机管路，确保彻底清洁","C、集水杯应处于管路最低位置，清除冷凝水时管路应保持密闭","D、集水杯中的冷凝水无需特殊处理，定期更换管路即可"],"answer":"C"},{"id":67,"type":"single","question":"某ICU护士小王在整理呼吸机配件时，对于一名长期使用呼吸机的患者，她应该如何处理重复使用的外部管路及配件？","options":["A、仅在患者使用后终末消毒一次","B、一人一用一消毒，并每周更换","C、每日擦拭消毒2次，无需更换","D、仅在管路污染或故障时才更换"],"answer":"B"},{"id":68,"type":"single","question":"在日常工作中，护士小李负责呼吸机的清洁消毒。对于使用中的呼吸机外壳、按钮、面板等部位，她应如何执行消毒？","options":["A、每日至少擦拭消毒1次，遇污染时消毒","B、每日至少擦拭消毒2次，遇污染时消毒","C、每周更换时一并消毒","D、仅在患者使用后进行终末消毒"],"answer":"B"},{"id":69,"type":"single","question":"某新生儿重症监护室（NICU）计划制定呼吸机相关肺炎（VAP）的预防与控制方案，该方案应主要依据哪项标准？","options":["A、WS/T311《医院隔离技术标准》","B、WS/T863《呼吸机相关肺炎预防与控制标准》","C、WS/T509《重症监护病房医院感染预防与控制规范》","D、WS/T313《医务人员手卫生规范》"],"answer":"B"},{"id":70,"type":"single","question":"在制定呼吸机相关肺炎（VAP）预防与控制措施时，需要引用哪些标准作为规范性文件？","options":["A、WS/T311和WS/T512","B、WS/T313和WS/T509","C、WS310.1和WS392","D、WS/T312和WS/T367"],"answer":"B"},{"id":71,"type":"single","question":"护士小张在配置化疗药物时，不慎将少量水剂药液洒落在操作台面上。根据标准操作规程，她应立即采取以下哪项措施处理污染的药液？","options":["A、使用干纱布垫擦拭","B、使用吸水纱布垫吸附","C、使用消毒剂喷洒","D、使用湿纱布垫擦拭"],"answer":"B"},{"id":72,"type":"single","question":"护士小王有4年临床工作经验，并通过了PICC专业知识与技能培训及考核。她可以独立进行PICC置管操作吗？","options":["A、可以，因为她已通过专业培训考核。","B、可以，只要她具备护士执业资格。","C、不可以，因为她临床工作经验不足5年。","D、不可以，因为她还需要医师的现场指导。"],"answer":"C"},{"id":73,"type":"single","question":"患者需要单次静脉推注一种刺激性药物。以下哪种输液工具不应被选用？","options":["A、外周静脉留置针","B、经外周静脉置入中心静脉导管（PICC）","C、一次性静脉输液钢针","D、中心静脉导管（CVC）"],"answer":"C"},{"id":74,"type":"single","question":"根据《静脉治疗护理技术操作标准》，静脉治疗的定义是什么？","options":["A、仅指通过静脉注射药物的治疗方法","B、将各种药物以及血液，通过静脉注入血液循环的治疗方法","C、特指通过中心静脉导管进行的输液治疗","D、指通过外周静脉留置针进行的所有治疗"],"answer":"B"},{"id":75,"type":"single","question":"护士小王需要配制抗肿瘤药物，根据标准要求，最合适的配制环境是什么？","options":["A、在普通治疗室的开放台面上","B、在I级生物安全柜内","C、在II级或III级垂直层流生物安全柜内","D、在患者床边"],"answer":"C"},{"id":76,"type":"single","question":"护士小王在为患者更换输液器时，应遵循的标准更换周期是多久？","options":["A、每12小时更换1次","B、每24小时更换1次","C、每48小时更换1次","D、每72小时更换1次"],"answer":"B"},{"id":77,"type":"single","question":"根据标准，外周静脉留置针建议的留置时间是多久？","options":["A、24小时至48小时","B、48小时至72小时","C、72小时至96小时","D、不超过1年"],"answer":"C"},{"id":78,"type":"single","question":"根据《静脉治疗护理技术操作标准》，关于静脉导管使用、维护与拔除操作人员的资质，下列哪项描述是正确的？","options":["A、必须由注册护士完成","B、必须由医师完成","C、必须由PICC专业培训合格且有5年经验的护士完成","D、应由经过培训的医务人员完成"],"answer":"D"},{"id":79,"type":"single","question":"护士小王在为患者进行PICC置管操作，关于穿刺技术，她应该遵循的标准是？","options":["A、采用塞丁格技术，成功后缓慢送入导管","B、采用塞丁格技术，成功后快速送入导管","C、采用常规穿刺技术，成功后缓慢送入导管","D、采用常规穿刺技术，成功后快速送入导管"],"answer":"A"},{"id":80,"type":"single","question":"护士小李负责的某位患者，其输液器已连续使用了22小时，目前输液器外观完好且未发现污染迹象。根据相关规范，小李应如何处理该输液器？","options":["A、立即更换","B、继续使用，直到输注完毕再更换","C、继续使用，满24小时后再更换","D、继续使用，满4小时后再更换"],"answer":"C"},{"id":81,"type":"single","question":"根据末梢血采集指南，一名体重8公斤的4个月大婴儿，最适宜的采血部位是哪里？","options":["A、足跟","B、手指","C、耳垂","D、足弓"],"answer":"A"},{"id":82,"type":"single","question":"一名8岁儿童在指尖采血后，穿刺部位出现局部血肿。根据处理规范，以下哪项措施是正确的？","options":["A、立即在肿胀部位进行热敷，温度不高于42℃","B、在肿胀部位及时冷敷，并观察皮肤变化避免冻伤","C、肿胀发生24小时内可以热敷血肿部位","D、肿胀发生后应立即进行按摩以促进血液循环"],"answer":"B"},{"id":83,"type":"single","question":"根据末梢血标本采集指南，关于标本的保存与运送时间，以下哪项是正确的？","options":["A、应在采集后1小时内完成送检及离心","B、应在采集后2小时内完成送检及离心","C、应在采集后4小时内完成送检及离心","D、应在采集后6小时内完成送检及离心"],"answer":"B"},{"id":84,"type":"single","question":"一名护士准备为一名2岁的儿童进行指尖末梢采血。根据指南，采血后按压止血时，以下哪项操作是正确的？","options":["A、按压穿刺点至少30秒，然后贴上创口贴","B、按压穿刺点至少60秒，然后贴上创口贴","C、按压穿刺点至少60秒，但避免使用创口贴","D、按压穿刺点至少30秒，但避免使用创口贴"],"answer":"B"},{"id":85,"type":"single","question":"一名体重为4kg的2个月大婴儿需要进行末梢血采集，根据指南，最适宜的穿刺部位是？","options":["A、手指（中指或无名指尖两侧）","B、足跟（内侧或外侧）","C、手指（拇指）","D、足跟（足弓区域）"],"answer":"B"},{"id":86,"type":"single","question":"一名7岁儿童需要进行指尖末梢血采集，根据指南，其穿刺深度不应超过多少毫米？","options":["A、0.85mm","B、1.5mm","C、2.0mm","D、2.4mm"],"answer":"C"},{"id":87,"type":"single","question":"根据末梢采血指南，一名体重约5kg的3个月大婴儿，在常规情况下应选择哪个部位进行穿刺？","options":["A、足跟","B、指尖","C、耳垂","D、足弓"],"answer":"A"},{"id":88,"type":"single","question":"一名检验科技师在接收末梢血标本时，需要确保标本处理符合规范。根据末梢血标本采集指南，对于需要离心分离血清/血浆的末梢血标本，从采集到完成离心分离，最适宜在多长时间内完成？","options":["A、1小时内","B、2小时内","C、4小时内","D、8小时内"],"answer":"B"},{"id":89,"type":"single","question":"护士小李在为一名患者采集末梢血后，穿刺部位发生了局部血肿。根据末梢血标本采集指南，她应该在肿胀发生多久后，可以开始对血肿部位进行热敷，且热敷温度不应超过多少度？","options":["A、12小时后，温度不高于50℃","B、24小时后，温度不高于42℃","C、48小时后，温度不高于45℃","D、立即热敷，温度不高于40℃"],"answer":"B"},{"id":90,"type":"single","question":"根据相关标准，末梢血是指通过皮肤穿刺获得的血液，其成分来源不包括以下哪一项？","options":["A、微动脉","B、微静脉","C、间质液体","D、淋巴管"],"answer":"D"},{"id":91,"type":"single","question":"根据《手术部位感染预防与控制标准》，下列哪项手术属于清洁切口（Ⅰ类切口）？","options":["A、经口咽部手术","B、开放性骨折手术","C、子宫全切除术","D、甲状腺次全切除术"],"answer":"D"},{"id":92,"type":"single","question":"某医院外科医生正在准备一份关于手术部位感染预防的培训材料。根据相关标准，该标准的适用范围是什么？","options":["A、仅适用于洁净手术部","B、适用于所有医疗机构","C、适用于开展外科手术工作的医疗机构","D、仅适用于需要进行手术部位感染监测的科室"],"answer":"C"},{"id":93,"type":"single","question":"护士小王在为一名接受甲状腺次全切除术（清洁切口）的患者进行手术区皮肤消毒时，应遵循以下哪种消毒方向？","options":["A、从外向内消毒","B、从内向外消毒","C、从切口一侧向另一侧消毒","D、从切口上方开始环形消毒"],"answer":"B"},{"id":94,"type":"single","question":"一名患者术后切口出现感染迹象，医生开具病原学检查医嘱。护士在采集标本时，下列哪项是必须记录在标本标识上的关键信息？","options":["A、患者的家庭住址","B、标本采集的日期和时间及是否在使用抗菌药物前采集","C、手术医生的姓名","D、患者住院期间的总费用"],"answer":"B"},{"id":95,"type":"single","question":"某医院手术室上午计划在同一手术间进行一台甲状腺次全切除术（清洁切口）和一台开放性骨折手术（污染切口）。根据手术部位感染预防与控制标准，这两台手术应如何安排台次顺序？","options":["A、先做污染切口手术，再做清洁切口手术","B、先做清洁切口手术，再做污染切口手术","C、两台手术无顺序要求，可任意安排","D、必须安排在不同手术间进行"],"answer":"B"},{"id":96,"type":"single","question":"护士小张发现一位术后患者的手术切口有红肿、渗液，怀疑发生手术部位感染。在采集该开放伤口标本进行病原学检测时，下列哪项操作符合标准要求？","options":["A、先用碘伏消毒伤口表面，再用拭子采集分泌物","B、用无菌生理盐水冲洗伤口后，采集深部组织标本","C、在给予患者抗菌药物后，立即采集标本送检","D、用75%酒精擦拭伤口边缘后，采集浅表碎屑"],"answer":"B"},{"id":97,"type":"single","question":"一名护士在准备一台择期手术的术中用品时，根据标准要求，她需要将手术冲洗液加温至多少摄氏度左右？","options":["A、不低于36.0℃","B、36.0℃","C、37.0℃","D、不低于37.0℃"],"answer":"C"},{"id":98,"type":"single","question":"手术室采集了一份深部组织标本，需要送检进行病原学培养。根据标准操作规程，以下关于标本送检前处理的描述，哪一项是正确的？","options":["A、应立即放入冰箱冷藏保存","B、应尽快送检，但最长可在冰箱保存24小时","C、应尽快送检，送检过程中禁止放入冰箱","D、应尽快送检，若不能及时送检，应将标本放于冰箱"],"answer":"C"},{"id":99,"type":"single","question":"一位患者接受了无植入物的膝关节清创缝合术，术后第35天，切口深部组织出现红肿、疼痛，并伴有脓性分泌物。根据《手术部位感染预防与控制标准》，该患者的情况最可能属于哪种手术部位感染？","options":["A、表浅切口感染","B、深部切口感染","C、器官（或腔隙）感染","D、不属于手术部位感染"],"answer":"D"},{"id":100,"type":"single","question":"一位患者因股骨颈骨折接受了人工髋关节置换术（有植入物）。术后第60天，手术切口深筋膜及肌肉层出现感染。根据《手术部位感染预防与控制标准》，该感染应归类为？","options":["A、表浅切口感染","B、深部切口感染","C、器官（或腔隙）感染","D、不属于手术部位感染"],"answer":"B"},{"id":101,"type":"single","question":"某医院ICU在3天内陆续发现4名患者出现相同病原体（经基因测序证实为同源）的肺部感染。根据WS/T524—2025标准，这种情况应被定义为？","options":["A、医院感染聚集","B、疑似医院感染暴发","C、医院感染暴发","D、医院感染假暴发"],"answer":"C"},{"id":102,"type":"single","question":"某医院怀疑一起手术部位感染暴发与某批次植入物有关。在进行个案调查时，根据附录B的要求，除了记录植入物信息，还应采取什么措施？","options":["A、立即停止所有手术","B、对同批号植入物进行检测","C、要求所有患者进行隔离","D、更换所有消毒剂品牌"],"answer":"B"},{"id":103,"type":"single","question":"根据医院感染暴发控制标准附录中的手术记录表格，手术切口类型分为几类？","options":["A、三类","B、四类","C、五类","D、六类"],"answer":"B"},{"id":104,"type":"single","question":"某医院感染管理科在监测数据时发现，某科室短时间内出现了4例临床表现相似的手术切口感染病例。根据标准，若要确认医院感染暴发，以下哪项是必须满足的条件？","options":["A、与暴发前相比，发病率升高明显且具有统计学意义","B、医院感染病例数超过历年散发发病率水平","C、病例数达到3例以上即可确认","D、实验室检测方法发生了改变"],"answer":"A"},{"id":105,"type":"single","question":"根据《医院感染暴发控制标准》，撰写医院感染暴发调查报告时，哪个部分是必须包含的核心内容？","options":["A、医院感染暴发事件的发生要素","B、医院过去一年的整体运营数据","C、调查人员的个人履历","D、医院未来五年的发展规划"],"answer":"A"},{"id":106,"type":"single","question":"某医院发生疑似医院感染暴发，调查人员在初步了解现场信息后，下一步应开展哪项工作以确认暴发？","options":["A、撰写最终调查报告","B、分析医院感染罹患率并与暴发前比较","C、向社会公布调查结果","D、申请增加医院年度预算"],"answer":"B"},{"id":107,"type":"single","question":"医院感染管理科王医生在调查一起疑似呼吸道感染暴发时，需要采集相关临床标本进行检测。根据《医院感染暴发控制标准》中关于标本采集的指导，以下哪项是王医生应考虑采集的标本类型？","options":["A、脑脊液","B、咽拭子","C、关节液","D、心包积液"],"answer":"B"},{"id":108,"type":"single","question":"外科张医生正在填写一份手术患者感染调查个案表，其中需要记录手术切口类型。根据《医院感染暴发控制标准》附录B中的表格内容，手术切口类型不包括以下哪一项？","options":["A、清洁","B、清洁-污染","C、污染","D、无菌"],"answer":"D"},{"id":109,"type":"single","question":"某医院儿科病房一周内出现5例患儿腹泻，临床症候群相似，但病原学检测结果尚未明确。根据相关标准，这种情况应首先被判定为？","options":["A、医源性感染","B、疑似医院感染暴发","C、医院感染暴发","D、医院感染假暴发"],"answer":"B"},{"id":110,"type":"single","question":"某医院ICU病房在3天内，先后有4名患者出现高热、咳嗽、咳痰，且痰培养结果均为耐甲氧西林金黄色葡萄球菌。根据相关标准，这种情况应被判定为？","options":["A、医院感染聚集","B、疑似医院感染暴发","C、医院感染假暴发","D、医院感染暴发"],"answer":"D"},{"id":111,"type":"single","question":"根据医院感染病例判定标准，以下哪种情况属于消化系统感染的具体类型？","options":["A、子宫内膜炎","B、表浅切口感染","C、抗生素相关性腹泻","D、结膜炎"],"answer":"C"},{"id":112,"type":"single","question":"在医学服务中，因病原体传播引起的感染被定义为什么？","options":["A、医院感染","B、医源性感染","C、定植","D、重复感染"],"answer":"B"},{"id":113,"type":"single","question":"在医院感染分类中，手术部位感染不包括以下哪一项？","options":["A、表浅切口感染","B、深部切口感染","C、器官/腔隙感染","D、压力性损伤感染"],"answer":"D"},{"id":114,"type":"single","question":"在血流感染的医院感染分类中，以下哪一项是明确列出的细分类型？","options":["A、临床诊断的导管相关血流感染","B、实验室证实的中心静脉导管相关血流感染","C、社区获得性血流感染","D、原发性血流感染"],"answer":"B"},{"id":115,"type":"single","question":"根据医院感染病例判定标准，下列哪一项属于泌尿系统感染的细分类型？","options":["A、尿路感染（导尿管相关或非导尿管相关）","B、表浅切口感染","C、咽炎、喉炎、会厌炎","D、胃肠炎"],"answer":"A"},{"id":116,"type":"single","question":"一名患者在医院内被诊断为“无症状菌血尿路感染”，根据医院感染分类标准，该病例应归入以下哪个主要类别？","options":["A、手术部位感染","B、泌尿系统感染","C、血流感染","D、皮肤软组织感染"],"answer":"B"},{"id":117,"type":"single","question":"根据《医院感染病例判定标准：通用原则》，一名患者因肺炎入院，入院后第3天，其原有的肺炎感染基础上出现了肺脓肿。这种情况应如何判定？","options":["A、不属于医院感染，因为属于原有感染的并发症","B、不属于医院感染，因为入院时已有肺炎","C、应判定为医院感染，因为出现了新的部位感染","D、应判定为医院感染，因为入院超过48小时"],"answer":"C"},{"id":118,"type":"single","question":"根据《医院感染病例判定标准：通用原则》，以下哪种情况应判定为医院感染？","options":["A、患者因阑尾炎入院，术后第2天出现表浅切口感染","B、新生儿在出生后24小时内出现经产道获得的单纯疱疹病毒感染","C、患者因社区获得性流感入院，入院后第36小时病情加重","D、患者因皮肤软组织感染入院，入院后第10天，感染部位出现细菌定植但无炎症表现"],"answer":"A"},{"id":119,"type":"single","question":"一名患者因急性阑尾炎入院，手术顺利。术后第3天，患者出现发热、咳嗽、咳痰，经诊断为肺炎。根据《医院感染病例判定标准：通用原则》，该肺炎应如何判定？","options":["A、应判定为医院感染，因为是在入院48小时后发生的感染。","B、应判定为医院感染，因为与上次手术直接相关。","C、不应判定为医院感染，因为是无明确潜伏期的感染。","D、不应判定为医院感染，因为可能是社区获得性感染。"],"answer":"A"},{"id":120,"type":"single","question":"根据《医院感染病例判定标准：通用原则》附录A的分类，下列哪项感染不属于“骨关节感染”的范畴？","options":["A、骨髓炎","B、关节假体周围感染","C、椎间隙感染","D、脑膜炎或脑室炎"],"answer":"D"},{"id":121,"type":"single","question":"某医院感染科计划使用紫外线灯对一间病房进行空气消毒。病房内温度计显示为15℃，湿度计显示为55%。根据相关标准，以下哪种处理方式是正确的？","options":["A、可以按常规30分钟照射","B、应适当延长照射时间","C、应缩短照射时间","D、应停止使用紫外线灯"],"answer":"B"},{"id":122,"type":"single","question":"医院后勤人员准备使用一台产生臭氧的空气消毒机对门诊大厅进行消毒。根据标准，以下哪项操作是必须遵守的？","options":["A、消毒时室内可以留少量人员值守","B、消毒结束后应立即进入房间开窗通风","C、消毒结束后应等待至少30分钟方可进入","D、消毒时室内相对湿度应控制在60%以下"],"answer":"C"},{"id":123,"type":"single","question":"医院空调维护人员小王在例行检查时，发现某区域一次性使用型粗效过滤器的阻力比其额定初阻力高出55Pa。根据《医院空气净化管理标准》，小王应采取的管理措施是什么？","options":["A、清洗并消毒该过滤器","B、继续使用，待下次检查时再处理","C、立即更换该过滤器","D、检查周期缩短至7天"],"answer":"C"},{"id":124,"type":"single","question":"某医院在经空气传播性疾病暴发流行期间，其全空气空调系统应如何运行？","options":["A、立即关闭空调系统，停止运行","B、以最大新风量运行，并根据情况调整回风","C、保持原有新风和回风比例不变","D、仅开启新风系统，关闭所有回风"],"answer":"B"},{"id":125,"type":"single","question":"某医院感染管理科在制定普通病区日常空气净化方案时，依据相关标准，对于采用自然通风的频率和时间要求是？","options":["A、每日不少于1次，每次不少于20分钟","B、每日不少于2次，每次不少于30分钟","C、每日不少于3次，每次不少于45分钟","D、每日不少于4次，每次不少于60分钟"],"answer":"B"},{"id":126,"type":"single","question":"在经空气传播性疾病流行期间，医院对病区、诊室等区域采用自然通风的管理要求是？","options":["A、应停止自然通风，改用机械通风","B、应减少通风频次，防止疾病扩散","C、应增加通风频次","D、应保持原有通风频次不变"],"answer":"C"},{"id":127,"type":"single","question":"根据《医院空气净化管理标准》，以下哪项描述最准确地定义了“空气净化”？","options":["A、为室内空间提供室外空气，并在室内分配空气以稀释和清除室内产生的污染物，改善空气质量的方法。","B、利用风压或室内外空气的密度差引起的热压，促使室外空气流动而进行的通风换气。","C、降低室内空气中的微生物、颗粒物、有害气体等，使其达到无害化的技术或方法。","D、利用风机、排风扇等通风设备运转产生的动力使空气流动而进行的通风换气。"],"answer":"C"},{"id":128,"type":"single","question":"某市卫健委计划制定一份关于医疗机构空气净化管理的指导文件，文件应明确其适用范围。根据《医院空气净化管理标准》，这份指导文件应如何规定其适用范围？","options":["A、仅适用于三级甲等医院。","B、适用于各级各类医院，其他医疗机构可参照执行。","C、适用于所有医疗机构，包括诊所和社区卫生服务中心。","D、仅适用于医院的洁净手术部和重症监护病房。"],"answer":"B"},{"id":129,"type":"single","question":"某医院洁净技术区域的维护人员在对末端高效过滤器进行年度检查时，发现其阻力已达到运行初阻力的两倍。根据标准，此时最适宜采取的措施是什么？","options":["A、立即进行消毒处理","B、继续使用，待阻力达到3倍初阻力时再更换","C、进行清洗并消毒","D、宜进行更换"],"answer":"D"},{"id":130," （牛顿）/体重（千克）×100%","B、握力指数应大于50%","C、优势上肢握力比非优势上肢大5%~ 10%","D、男性和女性在青春期前的握力大小相似E30岁以后握力逐渐下降"],"answer":"BCDE"},{"id":48,"type":"multi","question":"协调评定内容包括 （ ）","options":["A、指鼻试验","B、轮替试验","C、跟膝胫试验","D、对指试验","E、压顶试验"],"answer":"ABCD"},{"id":49,"type":"multi","question":"疼痛的评定不包括 （ ）","options":["A、疼痛的部位","B、疼痛的性质","C、疼痛的程度","D、疼痛的频率","E、疼痛的时间"],"answer":"DE"},{"id":50,"type":"multi","question":"护士指导一名患腰椎间盘突出的患者进行康复，正确的是（ ）","options":["A、长期制动","B、超短波疗法","C、腰椎牵引","D、关节松动术","E、肌力训练"],"answer":"BCDE"}]};

// 扁平化所有题目：{id, type, question, options, answer, bank, bankId}
var allQuestions = [];
(function(){
  var bank1 = QUESTIONS.bank1;
  var bank2 = QUESTIONS.bank2;
  for(var i=0;i<bank1.length;i++){
    allQuestions.push({
      id:'bank1_'+bank1[i].id,
      type:bank1[i].type,
      question:bank1[i].question,
      options:bank1[i].options,
      answer:bank1[i].answer,
      bank:1,
      bankId:bank1[i].id
    });
  }
  for(var i=0;i<bank2.length;i++){
    allQuestions.push({
      id:'bank2_'+bank2[i].id,
      type:bank2[i].type,
      question:bank2[i].question,
      options:bank2[i].options,
      answer:bank2[i].answer,
      bank:2,
      bankId:bank2[i].id
    });
  }
})();

// 分离单选和多选
var singleQuestions = allQuestions.filter(function(q){return q.type==='single'});
var multiQuestions = allQuestions.filter(function(q){return q.type==='multi'});
var bank1Questions = allQuestions.filter(function(q){return q.bank===1});
var bank2Single = allQuestions.filter(function(q){return q.bank===2 && q.type==='single'});
var bank2Multi = allQuestions.filter(function(q){return q.bank===2 && q.type==='multi'});

// ========== 本地存储 ==========
var STORAGE_KEY = 'nursing_quiz_data_v2';
function loadData(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {weights:{}, wrongBook:[], history:[], totalDone:0, totalCorrect:0, totalWrong:0};
  }catch(e){return {weights:{}, wrongBook:[], history:[], totalDone:0, totalCorrect:0, totalWrong:0};}
}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}

// 获取题目权重（默认1.0）
function getWeight(qid, data){
  var w = data.weights[qid];
  if(!w) return 1.0;
  // 遗忘曲线：基于上次答对时间计算遗忘程度
  var now = Date.now();
  var lastCorrect = w.lastCorrectTime || 0;
  var interval = w.interval || 1; // 天
  var daysSince = lastCorrect ? (now - lastCorrect) / (1000*60*60*24) : 999;
  // 遗忘程度 = 已过天数 / 间隔天数，范围 [0.15, 1.0]
  var forgetting = Math.min(1.0, Math.max(0.25, daysSince / (interval * 1.5)));
  return forgetting;
}

// ========== 加权随机抽取 ==========
function weightedSample(arr, n, data, bankFilter){
  var pool = bankFilter ? arr.filter(bankFilter) : arr.slice();
  if(pool.length <= n) return pool.slice();
  
  // 为每个元素计算权重
  var items = pool.map(function(q){
    return {q:q, w:getWeight(q.id, data)};
  });
  
  // 加权随机抽样（不放回）
  var result = [];
  var remaining = items.slice();
  for(var i=0;i<n;i++){
    var totalW = 0;
    for(var j=0;j<remaining.length;j++) totalW += remaining[j].w;
    var r = Math.random() * totalW;
    var acc = 0;
    for(var j=0;j<remaining.length;j++){
      acc += remaining[j].w;
      if(r <= acc){
        result.push(remaining[j].q);
        remaining.splice(j,1);
        break;
      }
    }
  }
  return result;
}

// ========== 全局状态 ==========
var appData = loadData();
var currentPage = 'home';
var examQuestions = [];
var examAnswers = {};   // 用户答案 {qid: 'A' 或 ['A','B']}
var examMarked = {};    // 标记的题目
var currentQIndex = 0;
var timerSeconds = 2700; // 45分钟
var timerInterval = null;
var examSubmitted = false;

// ========== 页面切换 ==========
function showPage(name){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
  document.getElementById('page-'+name).classList.add('active');
  currentPage = name;
}

// ========== 首页 ==========
function updateHomeStats(){
  document.getElementById('stat-total').textContent = appData.totalDone || 0;
  var rate = appData.totalDone ? Math.round(appData.totalCorrect/appData.totalDone*100) : 0;
  document.getElementById('stat-correct').textContent = rate + '%';
  document.getElementById('stat-wrong').textContent = appData.totalWrong || 0;
}
function showHome(){showPage('home');updateHomeStats()}

// ========== 开始答题 ==========
function startExam(examMode){
  if(examMode === undefined) examMode = false;
  appData = loadData();
  examAnswers = {};
  examMarked = {};
  currentQIndex = 0;
  timerSeconds = 2700;
  examSubmitted = false;
  window._examMode = examMode;
  
  // 抽取题目：bank1占30%=30道，bank2占70%=70道
  // bank1: 30道单选
  var bank1Sample = examMode ? randomSample(bank1Questions, 30) : weightedSample(bank1Questions, 30, appData);
  // bank2: 65道单选 + 5道多选
  var bank2SingleSample = examMode ? randomSample(bank2Single, 65) : weightedSample(bank2Single, 65, appData);
  var bank2MultiSample = examMode ? randomSample(bank2Multi, 5) : weightedSample(bank2Multi, 5, appData);
  
  examQuestions = [].concat(bank1Sample, bank2SingleSample, bank2MultiSample);
  // 打乱顺序
  shuffleArray(examQuestions);
  
  showPage('exam');
  document.getElementById('modeLabel').textContent = examMode ? '模拟考试模式（纯随机）' : '智能练习模式（遗忘曲线）';
  document.getElementById('modeLabel').style.color = examMode ? 'var(--danger)' : 'var(--primary)';
  renderQNav();
  renderQuestion();
  startTimer();
  updateProgress();
  window.scrollTo(0,0);
}

function randomSample(arr, n){
  var pool = arr.slice();
  shuffleArray(pool);
  return pool.slice(0, Math.min(n, pool.length));
}
function shuffleArray(arr){
  for(var i=arr.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var tmp = arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
}

// ========== 计时器 ==========
function startTimer(){
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(function(){
    timerSeconds--;
    updateTimerDisplay();
    if(timerSeconds <= 0){
      clearInterval(timerInterval);
      submitExam();
    }
  },1000);
}
function updateTimerDisplay(){
  var m = Math.floor(timerSeconds/60);
  var s = timerSeconds % 60;
  var el = document.getElementById('timer');
  el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  if(timerSeconds < 300) el.classList.add('warning');
  else el.classList.remove('warning');
}

// ========== 题目导航 ==========
function toggleQNav(){
  var nav = document.getElementById('qNav');
  var toggle = document.getElementById('qNavToggle');
  nav.classList.toggle('open');
  toggle.textContent = nav.classList.contains('open') ? '收起题目导航 ▲' : '展开题目导航 ▼';
}
function renderQNav(){
  var html = '';
  for(var i=0;i<examQuestions.length;i++){
    var q = examQuestions[i];
    var cls = 'q-dot';
    if(i === currentQIndex) cls += ' current';
    if(examAnswers[q.id] !== undefined) cls += ' answered';
    if(examMarked[q.id]) cls += ' marked';
    html += '<span class="'+cls+'" onclick="goToQuestion('+i+')">'+(i+1)+'</span>';
  }
  document.getElementById('qNav').innerHTML = html;
  // 如果导航已展开，滚动到当前题目位置
  var nav = document.getElementById('qNav');
  if(nav.classList.contains('open')){
    setTimeout(function(){
      var cur = nav.querySelector('.current');
      if(cur) cur.scrollIntoView({behavior:'smooth',block:'nearest'});
    },100);
  }
}
function goToQuestion(i){
  currentQIndex = i;
  renderQNav();
  renderQuestion();
  window.scrollTo(0,0);
}
function nextQuestion(){
  if(currentQIndex < examQuestions.length-1){currentQIndex++;renderQNav();renderQuestion();window.scrollTo(0,0)}
}
function prevQuestion(){
  if(currentQIndex > 0){currentQIndex--;renderQNav();renderQuestion();window.scrollTo(0,0)}
}
function markQuestion(){
  var q = examQuestions[currentQIndex];
  examMarked[q.id] = !examMarked[q.id];
  document.getElementById('markBtn').textContent = examMarked[q.id] ? '取消标记' : '标记';
  renderQNav();
}

// ========== 渲染题目 ==========
function renderQuestion(){
  var q = examQuestions[currentQIndex];
  var isMulti = q.type === 'multi';
  var html = '<div class="q-card'+(isMulti?' multi':'')+'">';
  html += '<div class="q-num"><span class="tag tag-'+(isMulti?'multi':'single')+'">'+(isMulti?'多选题':'单选题')+'</span> 第'+(currentQIndex+1)+'题</div>';
  html += '<div class="q-text">'+escapeHtml(q.question)+'</div>';
  
  var userAns = examAnswers[q.id];
  for(var i=0;i<q.options.length;i++){
    var opt = q.options[i];
    var letter = String.fromCharCode(65+i);
    var selected = isMulti ? (userAns && userAns.indexOf(letter)>=0) : (userAns === letter);
    html += '<div class="option'+(selected?' selected':'')+'" onclick="selectOption(\''+letter+'\')">';
    html += '<span class="letter">'+letter+'</span>';
    html += '<span>'+escapeHtml(opt.replace(/^[A-E][、，。,.\s]*/,''))+'</span>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('questionArea').innerHTML = html;
  document.getElementById('markBtn').textContent = examMarked[q.id] ? '取消标记' : '标记';
  updateProgress();
}

function selectOption(letter){
  var q = examQuestions[currentQIndex];
  if(q.type === 'multi'){
    var ans = examAnswers[q.id] || [];
    var idx = ans.indexOf(letter);
    if(idx >= 0) ans.splice(idx,1);
    else ans.push(letter);
    ans.sort();
    examAnswers[q.id] = ans;
    renderQuestion();
    renderQNav();
  } else {
    examAnswers[q.id] = letter;
    renderQuestion();
    renderQNav();
    // 单选选完后自动跳转下一题
    if(currentQIndex < examQuestions.length - 1){
      setTimeout(function(){
        currentQIndex++;
        renderQNav();
        renderQuestion();
        window.scrollTo(0,0);
      }, 350);
    }
  }
}

function updateProgress(){
  var answered = Object.keys(examAnswers).length;
  document.getElementById('progressFill').style.width = (answered/examQuestions.length*100)+'%';
  document.getElementById('progressText').textContent = answered+'/'+examQuestions.length;
}

// ========== 交卷确认 ==========
function confirmSubmit(){
  var answered = Object.keys(examAnswers).length;
  var total = examQuestions.length;
  if(answered < total){
    document.getElementById('confirmMsg').textContent = '你还有'+(total-answered)+'道题未作答，确定要提交吗？';
  } else {
    document.getElementById('confirmMsg').textContent = '确定要提交试卷吗？提交后无法修改。';
  }
  document.getElementById('confirmDialog').style.display = 'flex';
}
function closeConfirm(){
  document.getElementById('confirmDialog').style.display = 'none';
}

// ========== 提交评分 ==========
function submitExam(){
  document.getElementById('confirmDialog').style.display = 'none';
  clearInterval(timerInterval);
  if(examSubmitted) return;
  examSubmitted = true;
  
  var correct = 0;
  var wrong = 0;
  var wrongList = [];
  
  for(var i=0;i<examQuestions.length;i++){
    var q = examQuestions[i];
    var userAns = examAnswers[q.id];
    var rightAns = q.answer;
    var isCorrect = false;
    
    if(q.type === 'multi'){
      // 多选题：用户答案排序后与正确答案比较
      var ua = userAns ? userAns.slice().sort().join('') : '';
      var ra = rightAns.split('').sort().join('');
      isCorrect = (ua === ra);
    } else {
      isCorrect = (userAns && userAns === rightAns);
    }
    
    if(isCorrect){
      correct++;
      // 更新权重：答对降低权重
      updateWeight(q.id, true);
    } else {
      wrong++;
      // 更新权重：答错恢复权重
      updateWeight(q.id, false);
      // 加入错题本
      if(appData.wrongBook.indexOf(q.id) < 0){
        appData.wrongBook.push(q.id);
      }
      wrongList.push({
        question: q,
        userAns: userAns || '未作答',
        rightAns: rightAns,
        index: i
      });
    }
  }
  
  appData.totalDone = (appData.totalDone||0) + examQuestions.length;
  appData.totalCorrect = (appData.totalCorrect||0) + correct;
  appData.totalWrong = (appData.totalWrong||0) + wrong;
  
  // 记录历史
  appData.history.push({
    date: new Date().toISOString(),
    total: examQuestions.length,
    correct: correct,
    wrong: wrong,
    score: Math.round(correct/examQuestions.length*100),
    duration: 2700 - timerSeconds
  });
  // 只保留最近50条
  if(appData.history.length > 50) appData.history = appData.history.slice(-50);
  
  saveData(appData);
  
  // 渲染结果
  showPage('result');
  renderResult(correct, wrong, wrongList);
}

function updateWeight(qid, isCorrect){
  if(!appData.weights[qid]){
    appData.weights[qid] = {totalCorrect:0, totalWrong:0, lastCorrectTime:0, interval:1, easeFactor:2.5};
  }
  var w = appData.weights[qid];
  if(isCorrect){
    w.totalCorrect = (w.totalCorrect||0) + 1;
    w.lastCorrectTime = Date.now();
    // SM-2: 间隔翻倍，最少1天
    w.interval = Math.max(1, (w.interval||1) * (w.easeFactor||2.5));
    w.easeFactor = Math.max(1.3, (w.easeFactor||2.5) + 0.1);
  } else {
    w.totalWrong = (w.totalWrong||0) + 1;
    // 答错：间隔减半，降低难度系数
    w.interval = Math.max(1, (w.interval||1) * 0.5);
    w.easeFactor = Math.max(1.3, (w.easeFactor||2.5) - 0.2);
  }
}

function renderResult(correct, wrong, wrongList){
  var total = examQuestions.length;
  var score = Math.round(correct/total*100);
  var scoreClass = score>=90?'score-excellent':score>=70?'score-good':score>=50?'score-fair':'score-poor';
  var usedTime = 2700 - timerSeconds;
  var min = Math.floor(usedTime/60);
  var sec = usedTime%60;
  
  var html = '<div class="card" style="text-align:center">';
  html += '<h3 style="margin-bottom:16px">答题结果</h3>';
  html += '<div class="score-circle '+scoreClass+'">'+score+'分</div>';
  html += '<div class="result-stats">';
  html += '<div class="result-stat"><div class="val" style="color:#16a34a">'+correct+'</div><div class="lbl">正确</div></div>';
  html += '<div class="result-stat"><div class="val" style="color:#dc2626">'+wrong+'</div><div class="lbl">错误</div></div>';
  html += '<div class="result-stat"><div class="val">'+min+'分'+sec+'秒</div><div class="lbl">用时</div></div>';
  html += '</div></div>';
  
  if(wrongList.length > 0){
    html += '<div class="card"><h4 style="margin-bottom:12px">错题回顾（'+wrongList.length+'题）</h4><div class="wrong-list">';
    for(var i=0;i<wrongList.length;i++){
      var w = wrongList[i];
      html += '<div class="wrong-item">';
      html += '<div class="q-title">'+(w.index+1)+'. '+escapeHtml(w.question.question)+'</div>';
      html += '<div class="your-ans">你的答案：'+w.userAns+'</div>';
      html += '<div class="right-ans">正确答案：'+w.rightAns+'</div>';
      html += '<div style="margin-top:4px;font-size:13px;color:var(--text2)">';
      for(var j=0;j<w.question.options.length;j++){
        var optText = w.question.options[j].replace(/^[A-E][、，。,.\s]*/,'');
        var letter = String.fromCharCode(65+j);
        var isRight = w.rightAns.indexOf(letter)>=0;
        if(isRight) html += '<div style="color:var(--success);font-weight:600;padding:1px 0">'+letter+'. '+escapeHtml(optText)+'</div>';
      }
      html += '</div></div>';
    }
    html += '</div></div>';
  }
  
  document.getElementById('resultContent').innerHTML = html;
  window.scrollTo(0,0);
}

var wrongTab = 'all';
function showWrongBook(){
  appData = loadData();
  showPage('wrong');
  wrongTab = 'all';
  document.getElementById('tab-all').classList.add('active');
  document.getElementById('tab-redo').classList.remove('active');

}
function switchWrongTab(tab){

  document.getElementById('tab-all').classList.toggle('active', tab==='all');
  document.getElementById('tab-redo').classList.toggle('active', tab==='redo');

function renderWrongBook(){
  var wrongIds = appData.wrongBook || [];
  if(wrongIds.length === 0){
    document.getElementById('wrongContent').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无错题，继续加油！</p></div>';
    return;
  }
  
  // 找到错题详情
  var wrongQs = [];
  for(var i=0;i<wrongIds.length;i++){
    var q = findQuestionById(wrongIds[i]);
    if(q) wrongQs.push({id:wrongIds[i], q:q});
  }
  
  if(wrongTab === 'all'){
    var html = '<p style="font-size:14px;color:var(--text2);margin-bottom:12px">共 '+wrongQs.length+' 道错题</p>';
    for(var i=0;i<wrongQs.length;i++){
      var item = wrongQs[i];
      var w = appData.weights[item.id] || {};
      html += '<div class="review-card">';
      html += '<div class="meta"><span class="tag tag-'+(item.q.type==='multi'?'multi':'single')+'">'+(item.q.type==='multi'?'多选':'单选')+'</span> ';
      html += '错误'+(w.totalWrong||0)+'次 | 正确'+(w.totalCorrect||0)+'次</div>';
      html += '<div class="q-text">'+escapeHtml(item.q.question)+'</div>';
      html += '<div style="font-size:13px;color:var(--success);margin-top:4px">正确答案：'+item.q.answer+'</div>';
      html += '<div style="font-size:12px;color:var(--text2);margin-top:2px">';
      for(var j=0;j<item.q.options.length;j++){
        var optT = item.q.options[j].replace(/^[A-E][、，。,.\s]*/,'');
        var ltr = String.fromCharCode(65+j);
        if(item.q.answer.indexOf(ltr)>=0){
          html += ltr+'. '+escapeHtml(optT)+' | ';
        }
      }
      html += '</div>';
      html += '<button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="removeFromWrongBook(\''+item.id+'\')">移出错题本</button>';
      html += '</div>';
    }
    document.getElementById('wrongContent').innerHTML = html;
  } else {
    // 重新练习模式
    if(wrongQs.length === 0){
      document.getElementById('wrongContent').innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无错题</p></div>';
      return;
    }
    examQuestions = wrongQs.map(function(x){return x.q});
    examAnswers = {};
    examMarked = {};
    currentQIndex = 0;
    timerSeconds = Math.max(600, wrongQs.length * 60); // 每题至少1分钟
    examSubmitted = false;
    showPage('exam');
    renderQNav();
    renderQuestion();
    startTimer();
    updateProgress();
    window.scrollTo(0,0);
    return;
  }
}

function removeFromWrongBook(qid){
  var idx = appData.wrongBook.indexOf(qid);
  if(idx >= 0) appData.wrongBook.splice(idx,1);
  saveData(appData);
  renderWrongBook();
}

function findQuestionById(qid){
  for(var i=0;i<allQuestions.length;i++){
    if(allQuestions[i].id === qid) return allQuestions[i];
  }
  return null;
}

// ========== 学习统计 ==========
function showStats(){
  appData = loadData();
  showPage('stats');
  var hist = appData.history || [];
  var totalDone = appData.totalDone || 0;
  var totalCorrect = appData.totalCorrect || 0;
  var totalWrong = appData.totalWrong || 0;
  var examCount = hist.length;
  var wrongBookSize = (appData.wrongBook||[]).length;
  var rate = totalDone ? Math.round(totalCorrect/totalDone*100) : 0;
  var weights = appData.weights || {};

  // 概览
  var html = '<div class="card"><h3 style="margin-bottom:12px">学习统计</h3>';
  html += '<div class="stat-row" style="margin-bottom:8px">';
  html += '<div class="stat-item"><div class="num">'+totalDone+'</div><div class="label">总做题数</div></div>';
  html += '<div class="stat-item"><div class="num">'+rate+'%</div><div class="label">总正确率</div></div>';
  html += '<div class="stat-item"><div class="num">'+wrongBookSize+'</div><div class="label">错题数</div></div>';
  html += '</div>';
  html += '<div class="stat-row">';
  html += '<div class="stat-item"><div class="num">'+examCount+'</div><div class="label">考试次数</div></div>';
  html += '<div class="stat-item"><div class="num">'+totalCorrect+'</div><div class="label">答对次数</div></div>';
  html += '<div class="stat-item"><div class="num">'+totalWrong+'</div><div class="label">答错次数</div></div>';
  html += '</div></div>';

  // 题库表现：bank1 vs bank2
  var b1QIds = {}, b2QIds = {};
  for(var i=0;i<allQuestions.length;i++){
    if(allQuestions[i].bank === 1) b1QIds[allQuestions[i].id]=true;
    else b2QIds[allQuestions[i].id]=true;
  }
  var b1Correct = 0, b1Done = 0, b2Correct = 0, b2Done = 0;
  var scCorrect = 0, scDone = 0, mcCorrect = 0, mcDone = 0;
  var bank1Total = Object.keys(b1QIds).length;
  var bank2Total = Object.keys(b2QIds).length;
  for(var k in weights){
    var w = weights[k];
    if(!w) continue;
    var done = (w.totalCorrect||0)+(w.totalWrong||0);
    if(b1QIds[k]){ b1Done += done; b1Correct += (w.totalCorrect||0); }
    if(b2QIds[k]){ b2Done += done; b2Correct += (w.totalCorrect||0); }
    var q = findQuestionById(k);
    if(q){
      if(q.type === 'single'){ scDone += done; scCorrect += (w.totalCorrect||0); }
      else{ mcDone += done; mcCorrect += (w.totalCorrect||0); }
    }
  }
  html += '<div class="card"><h4 style="margin-bottom:8px">各题库表现</h4>';
  html += '<div class="perf-grid">';
  html += '<div class="perf-box"><div class="val">'+bank1Total+'</div><div class="lbl" style="color:#92400e">行标题库 题目数</div></div>';
  html += '<div class="perf-box"><div class="val">'+bank2Total+'</div><div class="lbl" style="color:#1e40af">大赛题库 题目数</div></div>';
  html += '<div class="perf-box"><div class="val">'+(scDone?Math.round(scCorrect/scDone*100):0)+'%</div><div class="lbl">单选正确率</div></div>';
  html += '<div class="perf-box"><div class="val">'+(mcDone?Math.round(mcCorrect/mcDone*100):0)+'%</div><div class="lbl">多选正确率</div></div>';
  html += '</div></div>';

  // 考试趋势图
  if(hist.length > 0){
    html += '<div class="card"><h4 style="margin-bottom:8px">考试趋势（最近10次）</h4>';
    var recent10 = hist.slice().reverse().slice(0,10).reverse();
    var maxScore = 0;
    for(var i=0;i<recent10.length;i++){ maxScore = Math.max(maxScore, recent10[i].score); }
    html += '<div class="chart-bar-wrap">';
    for(var i=0;i<recent10.length;i++){
      var h = recent10[i];
      var hPct = maxScore>0 ? Math.round(h.score/maxScore*70)+10 : 10;
      var bc = h.score>=70 ? 'var(--success)' : h.score>=50 ? 'var(--warning)' : 'var(--danger)';
      var d = new Date(h.date);
      var label = (d.getMonth()+1)+'/'+d.getDate();
      html += '<div style="flex:1;text-align:center">';
      html += '<div style="height:'+hPct+'px;background:'+bc+';border-radius:3px 3px 0 0;transition:height .3s" title="'+h.score+'分"></div>';

    html += '</div></div>';

  if(hist.length > 0){

    for(var i=0;i<recent.length;i++){

      var d = new Date(h.date);
      var dateStr = (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
      html += '<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:14px">';
      html += '<span style="color:var(--text2)">'+dateStr+'</span> ';
      html += '<span style="font-weight:600;color:'+(h.score>=70?'var(--success)':'var(--danger)')+'">'+h.score+'分</span> ';
      html += '<span style="color:var(--text2)">'+h.correct+'/'+h.total+'</span>';
      html += '</div>';
    }
    html += '</div>';
  }

  // 掌握程度
  var mastered = 0, learning = 0, newQ = 0;
  for(var i=0;i<allQuestions.length;i++){
    var w = weights[allQuestions[i].id];
    if(!w || !w.lastCorrectTime) newQ++;
    else if((w.interval||1) >= 7) mastered++;
    else learning++;
  }
  html += '<div class="card"><h4 style="margin-bottom:8px">掌握程度</h4>';
  html += '<div style="display:flex;height:24px;border-radius:12px;overflow:hidden;margin-bottom:8px">';
  var pctNew = Math.round(newQ/allQuestions.length*100);
  var pctLearn = Math.round(learning/allQuestions.length*100);
  var pctMaster = Math.round(mastered/allQuestions.length*100);
  html += '<div style="width:'+pctNew+'%;background:#e2e8f0" title="新题"></div>';

function renderAllQuestions(){
  var filter = _allQFilter;
  var search = (document.getElementById('allQSearch').value || '').toLowerCase();
  var weights = appData.weights || {};
  var wrongSet = {};
  (appData.wrongBook||[]).forEach(function(id){wrongSet[id]=true});

  }

  if(pool.length === 0){

  var html = '';

    var done = w ? (w.totalCorrect||0)+(w.totalWrong||0) : 0;
    var correct = w ? (w.totalCorrect||0) : 0;
    var acc = done>0 ? Math.round(correct/done*100)+'%' : '-';
    var bankTag = q.bank===1 ? '<span class="bank-tag bank-tag-b1">行标</span>' : '<span class="bank-tag bank-tag-b2">大赛</span>';
    var typeTag = '<span class="tag '+(q.type==='multi'?'tag-multi':'tag-single')+'">'+(q.type==='multi'?'多选':'单选')+'</span>';
    var isWrong = wrongSet[q.id] ? ' 🔴' : '';
    var accColor = done>0 ? (correct/done>=0.7 ? 'var(--success)' : 'var(--danger)') : 'var(--text2)';

    html += '<div class="all-q-item" onclick="showAllQDetail('+item.idx+')">';
    html += '<div class="q-header">';
    html += '<span class="q-idx">#'+(item.idx+1)+'</span>';
    html += '<span style="flex:1;font-size:13.5px;line-height:1.4">'+escapeHtml(q.question)+isWrong+'</span>';
    html += '</div>';
    html += '<div style="margin-top:6px;display:flex;gap:6px;align-items:center;font-size:12px">';
    html += typeTag + ' ' + bankTag;
    html += '<span style="color:'+accColor+';margin-left:auto">正确率 '+acc+'</span>';
    html += '</div>';
    html += '</div>';
  }

  html += '<div style="text-align:center;font-size:12px;color:var(--text2);margin-top:12px">共 '+pool.length+' 题 | 点击可查看详情</div>';
  document.getElementById('allQContent').innerHTML = html;
}
function showAllQDetail(idx){
  var q = allQuestions[idx];
  var w = appData.weights[q.id] || {};
  var done = (w.totalCorrect||0)+(w.totalWrong||0);
  var correct = w.totalCorrect||0;
  var html = '<div class="review-card"><div class="meta">#'+(idx+1)+' | '+(q.bank===1?'行标题库':'大赛题库')+' | '+(q.type==='multi'?'多选题':'单选题')+'</div>';
  html += '<div class="q-text" style="margin-bottom:6px">'+escapeHtml(q.question)+'</div>';
  for(var i=0;i<q.options.length;i++){
    var opt = q.options[i];
    var letter = String.fromCharCode(65+i);
    var isAnswer = q.answer.indexOf(letter)>=0;
    html += '<div class="option'+(isAnswer?' correct':'')+'"><span class="letter">'+letter+'</span><span>'+escapeHtml(opt.replace(/^[A-E][、，。,.\s]*/,''))+'</span></div>';
  }
  html += '<div style="margin-top:8px;font-size:12px;color:var(--text2)">正确率: '+(done>0?Math.round(correct/done*100)+'% ('+correct+'/'+done+')':'-')+' | 答题间隔: '+(w.interval||0)+'天 | 难度系数: '+(w.easeFactor||2.5).toFixed(1)+'</div>';
  html += '</div>';
  html += '<button class="btn btn-outline btn-block" style="margin-top:8px" onclick="renderAllQuestions()">返回列表</button>';
  document.getElementById('allQContent').innerHTML = html;
}

// ========== 工具函数 ==========
function escapeHtml(str){
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== 初始化 ==========
updateHomeStats();
</script>
